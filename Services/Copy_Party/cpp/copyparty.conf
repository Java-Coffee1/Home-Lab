# not actually YAML but lets pretend:
# -*- mode: yaml -*-
# vim: ft=yaml:


# example config for how copyparty can be used with an identity
# provider, replacing the built-in authentication/authorization
# mechanism, and instead expecting the reverse-proxy to provide
# the requester's username (and possibly a group-name, for
# optional group-based access control)
#
# the filesystem-path `/w` is used as the storage location
# because that is the data-volume in the docker containers,
# because a deployment like this (with an IdP) is more commonly
# seen in containerized environments -- but this is not required


[global]
  # e2dsa  # enable file indexing and filesystem scanning
  # e2ts   # enable multimedia indexing
  no-rescan   # 👈 ADD THIS (important)
  ansi   # enable colors in log messages
  usernames
  daw
  shr: /sharing-is-caring
  shr-adm: java
  rss
  allow-flac
  allow-wav
  name: File_Browser
  no-clone
  xdev
  no-robots
  ah-alg: argon2
  u2sort: n
  df: 1T
  chmod-f: 660
  chmod-d: 770
  zm-http: 80
  zm-https: 443

  # reverse proxy settings
  rproxy: -1           # Enable reverse proxy mode
  xff-src: lan       # Alternative: trust all LAN addresses
  # enable IdP support by expecting username/groupname in
  # http-headers provided by the reverse-proxy; header "X-IdP-User"
  # will contain the username, "X-IdP-Group" the groupname
  # Login/Logout pages
  idp-h-usr: X-Forwarded-User
  idp-h-grp: X-Forwarded-Groups
  auth-ord: idp,pw,ipu
  # auth-ord: idp,pw,ipu

  # idp-h-usr: X-Forwarded-User  # This will contain the username
  # idp-h-grp: X-Forwarded-Groups
  idp-login: https://fs.javamurray.com/oauth2/start
  idp-login-t: Login with authentik.javamurray.com
  idp-logout: https://fs.javamurray.com/oauth2/sign_out

  [/]
    /root
    accs:
      r: @acct
      a: Java  # User "java" has admin access
    flags:
      dots
  [/${u}/]
    /users-data/${u}
    accs:
      rwmd: ${u}
      a: Java
    flags:
      dots
      e2dsa
      e2ts
  [/chaosbox]
    /chaosbox
    accs:
      rwmd: @acct
      a: Java
    flags:
      dots
  [/immich-data]
    /user-photos
    accs:
      # r: @acct
      r: Java
    flags:
      dots

  [/google-drive]
    /google-drive
    accs:
      r: Java
    flags:
      dots
  [/linuxisos-audio-book]
    /linuxisos-audio-book
    accs:
      rwd: Java
    flags:
      dots

  # [/linux-isos]
  #   /linux-isos/
  #   accs:
  #     # r: @acct
  #     rwmd: Java  
  #     a: Java
  #   flags:
  #     dots