---
#docker stack deploy -c compose.yml outline
services:
  outline:
    container_name: outline-app
    image: docker.getoutline.com/outlinewiki/outline:latest
    user: "1000:1000"
    volumes:
      - outline-data:/var/lib/outline/data
    depends_on:
      - redis
    networks:
      - proxy-net
      - outline-net
    # labels:
    #   - 'traefik.enable=true'
    #   - 'traefik.http.routers.outline.rule=Host(`outline.javamurray.com`)'
    #   - 'traefik.http.routers.outline.entrypoints=https-external'
    #   - 'traefik.http.services.outline.loadbalancer.server.port=3000'
    #   - "traefik.http.routers.outline.tls=true"
    #   - "traefik.network=proxy-net"
    environment:
      NODE_ENV: ${NODE_ENV}
      SECRET_KEY: ${SECRET_KEY}
      UTILS_SECRET: ${UTILS_SECRET}
      FORCE_HTTPS: ${FORCE_HTTPS}
      ENABLE_UPDATES: ${ENABLE_UPDATES}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY}
      DATABASE_URL: ${DATABASE_URL}
      PGSSLMODE: ${PGSSLMODE}
      REDIS_COLLABORATION_URL: ${REDIS_URL}
      REDIS_URL: ${REDIS_URL}
      URL: ${URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_AUTH_URI: ${OIDC_AUTH_URI}
      OIDC_TOKEN_URI: ${OIDC_TOKEN_URI}
      OIDC_USERINFO_URI: ${OIDC_USERINFO_URI}
      OIDC_LOGOUT_URI: ${OIDC_LOGOUT_URI}
      FILE_STORAGE: "local"
      FILE_STORAGE_LOCAL_ROOT_DIR: /var/lib/outline/data/
      FILE_STORAGE_UPLOAD_MAX_SIZE: ${FILE_STORAGE_UPLOAD_MAX_SIZE}
      restart: unless-stopped
  redis:
    container_name: outline-redis
    image: redis
    env_file:
      - ./.env
    ports:
      - '6379:6379'
    volumes:
      - ./redis.conf:/redis.conf
    command: ['redis-server', '/redis.conf']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 30s
      retries: 3
    networks:
      - outline-net
    restart: unless-stopped

  # postgres:
  #   container_name: outline-db
  #   image: postgres:18
  #   env_file:
  #     - ./.env
  #   ports:
  #     - '5432:5432'
  #   volumes:
  #     # - database-data:/var/lib/postgresql/data
  #     - database-data:/var/lib/postgresql
  #   healthcheck:
  #     test: ['CMD', 'pg_isready', '-d', 'outline', '-U', '${POSTGRES_USER}']
  #     interval: 30s
  #     timeout: 20s
  #     retries: 3
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${POSTGRES_DB}
  #   networks:
  #     - outline-net
volumes:
  outline-data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.30.30.101,rw,nfsvers=4
      device: ":/mnt/DataDumpster/Docker-Containers/outline-data/"

networks:
  outline-net:
    external: true
  proxy-net:
    external: true